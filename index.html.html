<script>
// === PORTRAIT & BODY RENDERER ===
var _portraits={},_seeds={};
function hashStr(s){var h=0;for(var i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i)|0;return Math.abs(h)}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296}}
function getSeed(id,nm){if(_seeds[id])return _seeds[id];var r=mulberry32(hashStr(id+nm));var skins=["#e8c4a0","#d4a878","#c49070","#a07050","#8a6040","#704a30"];var hairs=["#1a1a1a","#3a2010","#6a4020","#8a6030","#aa8040","#ddd","#4a1010"];_seeds[id]={skin:skins[~~(r()*skins.length)],hairCol:hairs[~~(r()*hairs.length)],hairStyle:~~(r()*6),eyes:["#2a4a2a","#3a3a6a","#1a2a4a","#5a3a1a"][~~(r()*4)],scar:r()>.55,build:r()>.5?1:0,facialHair:~~(r()*4),nosew:2+~~(r()*2),mouthw:5+~~(r()*4)};return _seeds[id]}
function genPortrait(id,style,nm){if(_portraits[id])return _portraits[id];var cv=document.createElement("canvas");cv.width=48;cv.height=48;var c=cv.getContext("2d");var S=STYLES[style];var sd=getSeed(id,nm);c.fillStyle="#0a0a0a";c.fillRect(0,0,48,48);c.fillStyle=sd.skin;c.fillRect(20,36,8,6);c.beginPath();c.ellipse(24,24,11,13,0,0,Math.PI*2);c.fill();c.fillStyle=sd.hairCol;if(sd.hairStyle<2)c.fillRect(12,8,24,8);else if(sd.hairStyle<4){c.beginPath();c.arc(24,16,13,Math.PI,0);c.fill()}else c.fillRect(13,10,22,4);c.fillStyle="#fff";c.fillRect(17,22,6,4);c.fillRect(26,22,6,4);c.fillStyle=sd.eyes;c.fillRect(19,22,3,4);c.fillRect(28,22,3,4);c.fillStyle="#000";c.fillRect(20,23,2,2);c.fillRect(29,23,2,2);c.fillStyle=sd.hairCol;c.fillRect(17,20,6,2);c.fillRect(26,20,6,2);c.fillStyle=sd.skin;c.fillRect(23,26,sd.nosew,4);c.fillStyle="#7a3828";c.fillRect(~~(24-sd.mouthw/2),33,sd.mouthw,2);if(sd.facialHair===1){c.fillStyle=sd.hairCol;c.fillRect(18,33,12,3)}if(sd.facialHair>=2){c.fillStyle=sd.hairCol;c.fillRect(18,33,12,6)}if(sd.scar){c.strokeStyle="rgba(180,80,80,.7)";c.lineWidth=1;c.beginPath();c.moveTo(16,20);c.lineTo(22,28);c.stroke()}c.strokeStyle=S.col;c.lineWidth=2;c.strokeRect(1,1,46,46);_portraits[id]=cv.toDataURL();return _portraits[id]}
function getAC(f,sl,df){if(!f.equip||!f.equip[sl])return df;var it2=EQDATA[sl];if(!it2)return df;var x=it2.find(function(z){return z.id===f.equip[sl]});if(!x)return df;var t=it2.indexOf(x);var pct=t/Math.max(1,it2.length-1);var cs={chest:['#4a4a5a','#5a5a7a','#6a6a9a','#7878b0','#8888c8','#a0a0e0','#b8b8ff'],helmet:['#5a4a3a','#6a5a4a','#7a6a5a','#8a7a60','#a89868','#c4a84c','#ddc040'],shoulders:['#4a4a50','#5a5a60','#6a6a78','#7a7a90','#8888a8','#9898c0'],gauntlets:['#4a3a2a','#5a4a3a','#6a5a4a','#7a6a5a','#8a7a68','#a09078'],shinguards:['#4a4030','#5a5040','#6a6050','#7a7060','#8a8070','#9a9080']};var c2=cs[sl]||cs.chest;return c2[Math.min(c2.length-1,~~(pct*(c2.length-1)))]}

var ARENAS=[
{nm:'The Pit',sky:['#0a0610','#1a1020','#100a06'],floor:['#3a3020','#2a2218','#1a1610'],wall:'#4a3a28',accent:'#5a4030',crowd:true},
{nm:'Sand Arena',sky:['#1a1510','#2a2010','#1a1508'],floor:['#6a5a30','#5a4a28','#3a3018'],wall:'#7a6a48',accent:'#8a7a50',crowd:true},
{nm:'Blood Colosseum',sky:['#150808','#200a0a','#0a0505'],floor:['#3a2020','#2a1818','#1a1010'],wall:'#5a2020',accent:'#8a3030',crowd:true},
{nm:'Forest Clearing',sky:['#051008','#0a1a10','#081508'],floor:['#2a3a20','#1a2a18','#0a1a08'],wall:'#3a5030',accent:'#4a6040',crowd:false},
{nm:'Marble Arena',sky:['#0a0a10','#141420','#0a0a18'],floor:['#4a4a4a','#3a3a3a','#2a2a2a'],wall:'#6a6a6a',accent:'#8a8a8a',crowd:true},
{nm:'Desert Oasis',sky:['#1a1508','#2a2010','#201808'],floor:['#8a7a40','#6a5a30','#4a4020'],wall:'#aa9050',accent:'#c4a860',crowd:false},
{nm:'Volcanic Ring',sky:['#150505','#200808','#0a0303'],floor:['#2a1a1a','#3a2218','#1a0a0a'],wall:'#5a3020',accent:'#8a4020',crowd:true},
{nm:'Ice Cavern',sky:['#080a14','#0a1020','#060818'],floor:['#2a3040','#1a2030','#0a1020'],wall:'#3a4a5a',accent:'#5a6a7a',crowd:false},
{nm:'Royal Court',sky:['#100a14','#1a1020','#0a0810'],floor:['#3a2a3a','#2a1a2a','#1a0a1a'],wall:'#5a3a5a',accent:'#8a5a8a',crowd:true},

  if(!g.equip[sl])return-1;
  var items=sl==='weapon'||sl==='offhand'?WEAP:EQDATA[sl];
  if(!items)return-1;
  var it=items.find(function(x){return x.id===g.equip[sl]});
  if(!it)return-1;
  var idx=items.indexOf(it);
  return Math.min(4,~~(idx/Math.max(1,items.length/5)));
});
var tierCounts={};
equipped.forEach(function(t){if(t>=0)tierCounts[t]=(tierCounts[t]||0)+1});
for(var si=EQSETS.length-1;si>=0;si--){

  if((tierCounts[s.tier]||0)>=s.req)return s;
}
return null;
}

function getWpnIcon(wep){

var pool=WPN_ICONS[wep.v];
if(!pool||!pool.length)return'';
var tier=Math.min(pool.length-1,WEAP.indexOf(wep)%pool.length);
return pool[tier];
}
function getArmorIcon(slot){
var pool=WPN_ICONS[slot];
if(pool&&pool.length)return pool[0];
return'';
}

var _wpnImgCache={};
function getWpnImg(wep){
if(!wep)return null;
var icon=wep.v?getWpnIcon(wep):getArmorIcon(wep.v||'');
if(!icon)return null;
if(_wpnImgCache[icon])return _wpnImgCache[icon].complete?_wpnImgCache[icon]:null;
var img=new Image();
img.src=icon;
_wpnImgCache[icon]=img;
return img.complete?img:null;
}
